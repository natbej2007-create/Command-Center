<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in...</title>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display:flex; align-items:center;
           justify-content:center; height:100vh; margin:0; color:#444; }
  </style>
</head>
<body>
  <p>Connecting to Microsoft...</p>
  <script src="config.js"></script>
  <script>
    // This page runs inside the Teams auth popup. It does NOT wait on the
    // Teams SDK (that handshake can hang in the desktop popup). It simply
    // kicks the standard Microsoft login redirect. auth-end.html finishes it.
    (function () {
      var cfg = window.CC_CONFIG;
      var msalApp = new msal.PublicClientApplication({
        auth: {
          clientId: cfg.clientId,
          authority: "https://login.microsoftonline.com/" + cfg.tenantId,
          redirectUri: cfg.baseUrl + "/auth-end.html",
          navigateToLoginRequestUrl: false
        },
        cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
      });
      msalApp.initialize()
        .then(function () { return msalApp.handleRedirectPromise(); })
        .then(function () {
          var hint = "";
          try { hint = new URLSearchParams(window.location.search).get("login_hint") || ""; } catch (e) {}
          msalApp.loginRedirect({ scopes: cfg.scopes, loginHint: hint, prompt: "select_account" });
        })
        .catch(function (e) { document.body.innerHTML = "<p>Could not start sign in: " + e + "</p>"; });
    })();
  </script>
</body>
</html>
