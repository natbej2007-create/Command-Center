<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finishing sign in...</title>
  <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display:flex; align-items:center;
           justify-content:center; height:100vh; margin:0; color:#444; }
  </style>
</head>
<body>
  <p>Almost there...</p>
  <script src="config.js"></script>
  <script>
    // This page receives the Microsoft redirect, finishes login, gets a Graph
    // token, and hands it BACK to the main tab (which has isolated storage and
    // cannot read this window's session).
    (function () {
      var cfg = window.CC_CONFIG;
      var msalApp = new msal.PublicClientApplication({
        auth: {
          clientId: cfg.clientId,
          authority: "https://login.microsoftonline.com/" + cfg.tenantId,
          redirectUri: cfg.baseUrl + "/auth-end.html",
          navigateToLoginRequestUrl: false
        },
        cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
      });

      function notify(ok, payload) {
        // Always notifySuccess so the main tab can read the result (token or error).
        var msg = ok ? payload : JSON.stringify({ err: payload });
        microsoftTeams.app.initialize()
          .then(function () { microsoftTeams.authentication.notifySuccess(msg); })
          .catch(function () {
            document.body.innerHTML = "<p>" + (ok ? "Signed in. You can close this window." : ("Sign in failed: " + payload)) + "</p>";
          });
      }

      msalApp.initialize()
        .then(function () { return msalApp.handleRedirectPromise(); })
        .then(function (result) {
          var account = (result && result.account) || msalApp.getAllAccounts()[0];
          if (!account) { notify(false, "no-account"); return; }
          msalApp.setActiveAccount(account);
          return msalApp.acquireTokenSilent({ scopes: cfg.scopes, account }).then(function (r) {
            notify(true, JSON.stringify({ t: r.accessToken, n: account.name || account.username }));
          });
        })
        .catch(function (e) { notify(false, String(e)); });
    })();
  </script>
</body>
</html>
