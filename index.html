<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Command Center — United Services</title>
<script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-2: #f8f9fa;
    --bg-3: #f1f3f5;
    --text: #111827;
    --text-2: #6b7280;
    --text-3: #9ca3af;
    --border: rgba(0,0,0,0.08);
    --border-2: rgba(0,0,0,0.14);
    --radius: 8px;
    --radius-lg: 12px;
    --red-bg: #fee2e2;
    --red-fg: #b91c1c;
    --amber-bg: #fef3c7;
    --amber-fg: #b45309;
    --blue-bg: #dbeafe;
    --blue-fg: #1d4ed8;
    --green-bg: #dcfce7;
    --green-fg: #15803d;
    --gray-bg: #f3f4f6;
    --gray-fg: #6b7280;
    --dot-high: #ef4444;
    --dot-med: #f59e0b;
    --dot-low: #22c55e;
    --brand: #4f46e5;
    --brand-2: #6366f1;
    --brand-dark: #3730a3;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f3f4fb;
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  button {
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    border: 0.5px solid var(--border-2);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius);
    padding: 6px 12px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.1s;
    line-height: 1;
  }
  button:hover { background: var(--bg-3); }
  button:active { transform: scale(0.98); }
  button.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  button.primary:hover { opacity: 0.88; }
  button.danger { color: var(--red-fg); }

  a.btn {
    font-family: inherit;
    font-size: 13px;
    border: 0.5px solid var(--border-2);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius);
    padding: 6px 12px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
    transition: background 0.1s;
  }
  a.btn:hover { background: var(--bg-3); }

  textarea {
    font-family: inherit;
    font-size: 14px;
    line-height: 1.7;
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius);
    background: var(--bg-2);
    color: var(--text);
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: rgba(0,0,0,0.3); }

  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: var(--radius);
    white-space: nowrap;
    font-weight: 500;
  }

  /* Login */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: var(--bg);
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .login-logo {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--text);
    color: var(--bg);
    font-size: 16px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .login-card h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .login-card p { font-size: 14px; color: var(--text-2); margin-bottom: 1.5rem; }
  .login-err { font-size: 12px; color: var(--red-fg); margin-top: 1rem; display: none; }

  /* App shell */
  #app { display: none; max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    gap: 12px;
    background: linear-gradient(120deg, var(--brand-dark) 0%, var(--brand) 55%, var(--brand-2) 100%);
    color: #fff;
    padding: 18px 20px;
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 24px rgba(79,70,229,0.28);
  }
  .header-left { display: flex; align-items: center; gap: 13px; min-width: 0; }
  .brandmark {
    width: 42px; height: 42px; border-radius: 11px;
    background: rgba(255,255,255,0.18);
    color: #fff; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; letter-spacing: 0.5px;
  }
  .header h1 { font-size: 19px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .header-actions button {
    background: rgba(255,255,255,0.16);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
  }
  .header-actions button:hover { background: rgba(255,255,255,0.28); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .stat {
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    box-shadow: 0 1px 3px rgba(16,24,40,0.05);
  }
  .stat-label { font-size: 12px; margin-bottom: 5px; opacity: 0.95; font-weight: 600; }
  .stat-value { font-size: 27px; font-weight: 700; line-height: 1; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--bg);
    padding: 5px;
    border-radius: 11px;
    border: 0.5px solid var(--border);
    box-shadow: 0 1px 3px rgba(16,24,40,0.04);
    margin-bottom: 1.25rem;
  }
  .tab {
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-2);
    background: transparent;
  }
  .tab:hover { background: var(--bg-3); color: var(--text); }
  .tab.active {
    background: var(--brand);
    color: #fff;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(79,70,229,0.35);
  }
  .tab.active:hover { background: var(--brand); color: #fff; }

  /* Cards */
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-left: 4px solid var(--border-2);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    box-shadow: 0 1px 3px rgba(16,24,40,0.05);
  }
  .card.active { border-color: var(--border-2); }
  .card.conflict { border-color: #f87171; border-left-color: #ef4444; }

  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

  .card-meta { flex: 1; min-width: 0; }
  .card-subject {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-from { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
  .card-preview {
    font-size: 13px;
    color: var(--text-2);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-right { flex-shrink: 0; text-align: right; }
  .card-time { font-size: 12px; color: var(--text-3); margin-bottom: 6px; white-space: nowrap; }

  .ai-note {
    background: var(--bg-2);
    border-radius: var(--radius);
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text-2);
    display: flex;
    gap: 6px;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .conflict-banner {
    background: var(--red-bg);
    color: var(--red-fg);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* Event card extras */
  .event-title { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
  .event-meta { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }

  /* Action panel */
  #action-panel {
    margin-top: 16px;
    background: var(--bg);
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .panel-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
  .panel-context {
    font-size: 13px;
    color: var(--text-2);
    padding: 8px 10px;
    background: var(--bg-2);
    border-radius: var(--radius);
    margin-bottom: 1rem;
  }
  .panel-body { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 1rem; }
  .panel-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

  /* Team list */
  .team-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    width: 100%;
    text-align: left;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .team-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--blue-bg);
    color: var(--blue-fg);
    font-size: 11px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .team-name { font-size: 13px; font-weight: 500; }
  .team-role { font-size: 12px; color: var(--text-2); }

  /* Slot cards */
  .slot-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    margin-bottom: 8px;
    gap: 10px;
    box-shadow: 0 1px 2px rgba(16,24,40,0.04);
  }
  .slot-info { flex: 1; min-width: 0; }
  .slot-time { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .slot-reason { font-size: 12px; color: var(--text-2); }
  .slot-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* Loading / empty */
  .loading, .empty {
    text-align: center;
    padding: 2.5rem 0;
    color: var(--text-2);
  }
  .loading i, .empty i { font-size: 28px; display: block; margin-bottom: 10px; color: var(--text-3); }
  .loading p, .empty p { font-size: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; }

  @media (max-width: 560px) {
    #app { padding: 1rem 0.75rem 2.5rem; }

    /* Header banner stacks: name on top, actions below right */
    .header { flex-wrap: wrap; padding: 14px 16px; align-items: flex-start; }
    .header-left { flex: 1 1 100%; gap: 11px; }
    .brandmark { width: 38px; height: 38px; border-radius: 10px; font-size: 14px; }
    .header h1 { font-size: 16px; }
    .header-sub { font-size: 12px; }
    .header-actions { flex: 1 1 100%; justify-content: flex-end; margin-top: 12px; }

    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat:first-child { grid-column: 1 / -1; }
    .stat-value { font-size: 24px; }

    /* Tabs stay on one row; scroll sideways only if they truly cannot fit */
    .tabs { gap: 4px; padding: 4px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 8px 10px; font-size: 13px; gap: 5px; white-space: nowrap; flex-shrink: 0; }

    .card { padding: 0.85rem 1rem; }
    .card-from { word-break: break-word; }

    .slot-card { padding: 10px 11px; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GL</div>
    <h1>Command center</h1>
    <p>Sign in with your United Services Microsoft account to access your inbox and calendar.</p>
    <button class="primary" onclick="login()" style="width:100%; justify-content:center; padding:10px 16px; font-size:14px;">
      <i class="ti ti-brand-windows"></i>
      Sign in with Microsoft
    </button>
    <p class="login-err" id="login-err"></p>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="brandmark">CC</div>
      <div>
        <h1>Command center</h1>
        <p class="header-sub" id="user-info">Loading...</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="refresh-btn" onclick="refreshAll()">
        <i class="ti ti-refresh" id="refresh-icon"></i>
        Refresh
      </button>
      <button onclick="logout()">
        <i class="ti ti-logout"></i>
        Sign out
      </button>
    </div>
  </div>

  <div class="stats" id="stats-row" style="display:none"></div>

  <div class="tabs" id="tabs" style="display:none">
    <button class="tab active" onclick="switchTab('email')">
      <i class="ti ti-mail"></i>
      Email triage
    </button>
    <button class="tab" onclick="switchTab('calendar')">
      <i class="ti ti-calendar"></i>
      Calendar
    </button>
    <button class="tab" onclick="switchTab('availability')">
      <i class="ti ti-clock-hour-4"></i>
      Availability
    </button>
  </div>

  <div id="email-view"></div>
  <div id="calendar-view" style="display:none"></div>
  <div id="availability-view" style="display:none"></div>
  <div id="action-panel" style="display:none"></div>
</div>

<script src="config.js"></script>
<script>
// ================================================================
// Config comes from config.js (window.CC_CONFIG). No secrets here.
// ================================================================
const CONFIG = window.CC_CONFIG;

const TEAM = [
  { name: "Natalie Bejarano", role: "Executive Assistant",          initials: "NB" },
  { name: "Enos LeBaron",     role: "Chief Operating Officer",      initials: "EL" },
  { name: "Abraham LeBaron",  role: "Chief of Business Development",initials: "AL" },
  { name: "German Torres",    role: "BD System Owner",              initials: "GT" },
  { name: "Daniela",          role: "Systems",                      initials: "DA" },
  { name: "Fernanda",         role: "Project Controls",             initials: "FE" },
];

// ================================================================
// STATE
// ================================================================
let msalApp;
let inTeams      = false;
let accessToken  = null;
let activePanel  = null;
let activeTab    = "email";
let allEmails    = [];
let allEvents    = [];

// ---- Lightweight local memory (per browser): cleared items + last visit ----
const CC_STORE = "cc_state_v1";
function ccLoad() { try { return JSON.parse(localStorage.getItem(CC_STORE)) || {}; } catch (e) { return {}; } }
function ccSave(s) { try { localStorage.setItem(CC_STORE, JSON.stringify(s)); } catch (e) {} }
const ccState = ccLoad();
// Items cleared with Done stay cleared across visits.
let doneEmailIds = new Set(ccState.doneIds || []);
// "New" = arrived since the previous time you opened the app.
const sessionLastSeen = ccState.lastSeen ? new Date(ccState.lastSeen) : new Date();
ccState.lastSeen = new Date().toISOString();
ccSave(ccState);
function isNewEmail(e) {
  return !!(e && e.receivedDateTime && new Date(e.receivedDateTime) > sessionLastSeen);
}
function persistDone() {
  ccState.doneIds = Array.from(doneEmailIds);
  ccSave(ccState);
}

// ---- Known people (email -> name), remembered for faster attendee entry ----
let knownContacts = {};
try { knownContacts = JSON.parse(localStorage.getItem("cc_contacts")) || {}; } catch (e) { knownContacts = {}; }
function saveContacts() { try { localStorage.setItem("cc_contacts", JSON.stringify(knownContacts)); } catch (e) {} }
function addContact(email, name) {
  if (!email) return;
  email = String(email).trim().toLowerCase();
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return;
  if (!knownContacts[email] || (name && name.length > (knownContacts[email] || "").length)) {
    knownContacts[email] = name || knownContacts[email] || "";
  }
}
function collectContacts() {
  (allEmails || []).forEach(e => { const a = e.from && e.from.emailAddress; if (a) addContact(a.address, a.name); });
  (allEvents || []).forEach(ev => {
    const o = ev.organizer && ev.organizer.emailAddress; if (o) addContact(o.address, o.name);
    (ev.attendees || []).forEach(at => { const a = at.emailAddress; if (a) addContact(a.address, a.name); });
  });
  saveContacts();
}

// ================================================================
// INIT
// ================================================================
const msalConfig = {
  auth: {
    clientId:    CONFIG.clientId,
    authority:   "https://login.microsoftonline.com/" + CONFIG.tenantId,
    redirectUri: window.location.href.split("?")[0].split("#")[0],
  },
  // localStorage so the token cached by the auth popup is visible to this tab.
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false },
};

window.addEventListener("load", initApp);

async function initApp() {
  try {
    msalApp = new msal.PublicClientApplication(msalConfig);
    await msalApp.initialize();
    await msalApp.handleRedirectPromise().catch(() => {});
  } catch (e) {
    console.error("MSAL init error:", e);
  }

  // Are we running inside Microsoft Teams?
  try {
    await microsoftTeams.app.initialize();
    inTeams = true;
  } catch (e) {
    inTeams = false;
  }

  boot();
}

// ================================================================
// AUTH
// ================================================================
// Inside Teams the tab runs in an isolated iframe, so it cannot read the
// account the auth popup stored. The popup therefore hands the Graph token
// straight back to us, and we hold it here.
let teamsToken = null, teamsTokenExp = 0, teamsUserName = null, teamsAuthError = "";
function applyTeamsAuth(res) {
  try {
    const data = JSON.parse(res);
    if (data.err) { teamsToken = null; teamsAuthError = data.err; return; }
    teamsToken = data.t || null;
    teamsUserName = data.n || null;
    teamsTokenExp = Date.now() + 50 * 60 * 1000;
    teamsAuthError = "";
  } catch (e) { teamsToken = null; teamsAuthError = "Could not read the sign in result."; }
}
async function teamsSignIn() {
  const res = await microsoftTeams.authentication.authenticate({
    url: CONFIG.baseUrl + "/auth-start.html",
    width: 600, height: 600,
  });
  applyTeamsAuth(res);
  return teamsToken;
}

async function login() {
  hideLoginError();
  try {
    if (inTeams) {
      await teamsSignIn();
      await boot();
      if (!teamsToken) showLoginError(teamsAuthError || "Sign in did not return a token. Please try once more.");
    } else {
      await msalApp.loginRedirect({ scopes: CONFIG.scopes });
    }
  } catch (e) {
    console.error("Login error:", e);
    showLoginError("Sign in did not complete. " +
      (inTeams ? "Please try once more, and approve any Microsoft prompt." : "Please try again.") +
      " (" + (e && e.message ? e.message : e) + ")");
  }
}

async function getToken() {
  if (inTeams) {
    if (teamsToken && Date.now() < teamsTokenExp) return teamsToken;
    try { return await teamsSignIn(); } catch (e) { return null; }
  }
  const account = msalApp.getActiveAccount() || msalApp.getAllAccounts()[0];
  if (!account) return null;
  msalApp.setActiveAccount(account);
  try {
    const result = await msalApp.acquireTokenSilent({ scopes: CONFIG.scopes, account });
    return result.accessToken;
  } catch (e) {
    try {
      const r = await msalApp.acquireTokenPopup({ scopes: CONFIG.scopes });
      return r.accessToken;
    } catch (e2) {
      console.error("Token error:", e2);
      return null;
    }
  }
}

function logout() {
  if (inTeams) { teamsToken = null; teamsTokenExp = 0; location.reload(); return; }
  const account = msalApp.getActiveAccount() || msalApp.getAllAccounts()[0];
  msalApp.logoutRedirect({ account }).catch(() => {
    location.reload();
  });
}

// ================================================================
// BOOT
// ================================================================
let userName = "", userTitle = "";
function effectiveTitle() {
  // A title the person typed (saved on their device) wins; otherwise their
  // Microsoft profile title; otherwise none.
  return (ccState.title || "").trim() || (userTitle || "").trim();
}
function updateHeader() {
  const el = document.getElementById("user-info");
  if (!el) return;
  const title = effectiveTitle();
  const date = new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
  const role = title
    ? esc(title) + ", United Services"
    : "United Services · <span style='color:#c7d2fe;text-decoration:underline'>add your title</span>";
  el.innerHTML = esc(userName || "") +
    " · <span onclick='editTitle()' style='cursor:pointer' title='Click to set your title'>" + role + "</span> · " + esc(date);
}
function editTitle() {
  const el = document.getElementById("user-info");
  if (!el) return;
  const inp = document.createElement("input");
  inp.value = effectiveTitle();
  inp.placeholder = "Your title (e.g. Chief Strategy Officer)";
  inp.style.cssText = "font-family:inherit;font-size:13px;padding:4px 8px;border:0.5px solid var(--border-2);border-radius:6px;background:var(--bg-2);color:var(--text);width:260px";
  let saved = false;
  const save = () => { if (saved) return; saved = true; ccState.title = inp.value.trim(); ccSave(ccState); updateHeader(); };
  inp.addEventListener("keydown", e => { if (e.key === "Enter") save(); if (e.key === "Escape") { saved = true; updateHeader(); } });
  inp.addEventListener("blur", save);
  el.innerHTML = "";
  el.appendChild(document.createTextNode((userName || "") + " · "));
  el.appendChild(inp);
  inp.focus(); inp.select();
}

async function boot() {
  let name;
  if (inTeams) {
    if (!teamsToken) {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("app").style.display = "none";
      return;
    }
    name = teamsUserName || "United Services";
  } else {
    const account = msalApp.getActiveAccount() || msalApp.getAllAccounts()[0];
    if (!account) {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("app").style.display = "none";

    }

async function refreshAll() {
  closePanel();
  const icon = document.getElementById("refresh-icon");
  icon.classList.add("spinning");
  try {
    accessToken = await getToken();
    if (!accessToken) {
      icon.classList.remove("spinning");
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("app").style.display = "none";
      return;
    }
    try {
      const me = await graphGet("/me?$select=displayName,jobTitle");
      if (me && me.displayName) userName = me.displayName;
      userTitle = (me && me.jobTitle) || "";
      updateHeader();
    } catch (e) {}
    await Promise.all([loadEmails(), loadCalendar()]);
    collectContacts();
  } finally {
    icon.classList.remove("spinning");
  }
}

// ================================================================
// GRAPH API
// ================================================================
async function graphGet(url) {
  const res = await fetch("https://graph.microsoft.com/v1.0" + url, {
    headers: { Authorization: "Bearer " + accessToken, Prefer: 'outlook.timezone="UTC"' }
  });
  if (!res.ok) throw new Error("Graph error: " + res.status);
  return res.json();
}

async function loadEmails() {
  showLoading("email-view", "Reading your inbox...");
  try {
    const data = await graphGet(
      "/me/mailFolders/inbox/messages" +
      "?$top=15&$orderby=receivedDateTime%20desc" +
      "&$select=id,subject,from,receivedDateTime,bodyPreview,isRead,importance,hasAttachments,webLink"
    );
    allEmails = data.value || [];
    const present = new Set(allEmails.map(e => e.id));
    doneEmailIds = new Set(Array.from(doneEmailIds).filter(id => present.has(id)));
    persistDone();
    await triageAndRenderEmails();
  } catch (e) {
    document.getElementById("email-view").innerHTML =
      '<div class="empty"><i class="ti ti-alert-circle"></i><p>Could not load emails. Check your permissions.</p></div>';
  }
}

async function loadCalendar() {
  const now   = new Date();
  const start = new Date(now); start.setHours(0,0,0,0);
  const end   = new Date(now); end.setDate(now.getDate() + 7); end.setHours(23,59,59,999);
  try {
    const data = await graphGet(
      "/me/calendarview" +
      "?startdatetime=" + start.toISOString() +
      "&enddatetime="   + end.toISOString() +
      "&$select=id,subject,start,end,isAllDay,organizer,location,attendees,webLink,bodyPreview" +
      "&$orderby=start/dateTime&$top=50"
    );
    allEvents = detectConflicts(data.value || []);
    renderCalendar();
  } catch {
    document.getElementById("calendar-view").innerHTML =
      '<div class="empty"><i class="ti ti-alert-circle"></i><p>Could not load calendar.</p></div>';
  }
}

// ================================================================
// CLAUDE (via your Cloudflare Worker proxy — never the key directly)
// ================================================================
async function callClaude(payload) {
  if (!CONFIG.proxyUrl || CONFIG.proxyUrl.indexOf("PASTE_") === 0) {
    throw new Error("Proxy URL not set in config.js");
  }
  const res = await fetch(CONFIG.proxyUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("Proxy error: " + res.status);
  return res.json();
}

async function triageAndRenderEmails() {
  const emails = allEmails.filter(e => !doneEmailIds.has(e.id));
  if (!emails.length) { renderEmailList([], []); return; }

  renderEmailList(emails, null); // show cards with "Analyzing..." notes

  try {
    const data = await callClaude({
      model: "claude-sonnet-4-6",
      max_tokens: 3000,
      system: `You are triaging emails for Geronimo LeBaron, CSO of United Services (utility-scale solar construction, US/Mexico border region). His team: Natalie (EA), Enos (COO), Abraham (BD Chief), German (BD), Daniela (Systems), Fernanda (Project Controls), Ruth (Safety/OSHA). Classify each email and give a one-sentence action recommendation. For emails that genuinely need a reply (category action_required or meeting_request), also write a short draft reply of 1 to 2 sentences in Geronimo's voice: warm, direct, relational, a teacher and mentor, never using any dash character. For fyi or forward emails, leave the draft as an empty string. Return ONLY a valid JSON array, no markdown.`,
      messages: [{
        role: "user",
        content: `Classify these emails. Use the exact numeric id given. Return: [{"id":0,"category":"action_required|forward|meeting_request|fyi","priority":"high|medium|low","aiNote":"one action sentence","draftReply":"short reply in Geronimo's voice, or empty string"}]. Emails: ` +
          JSON.stringify(emails.map((e, i) => ({
            id: i,
            from: e.from && e.from.emailAddress ? e.from.emailAddress.address : "",
            subject: e.subject,
            preview: (e.bodyPreview || "").substring(0, 150),
          })))
      }]
    });
    const text   = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
    const match  = text.match(/\[[\s\S]*\]/);
    const raw    = match ? JSON.parse(match[0]) : [];
    const triage = raw.map(t => Object.assign({}, t, { id: (emails[Number(t.id)] ? emails[Number(t.id)].id : t.id) }));
    renderEmailList(emails, triage);
  } catch (e) {
    console.error("Triage error:", e);
    renderEmailList(emails, []);
  }
}

// ================================================================
// RENDER EMAILS
// ================================================================
function renderEmailList(emails, triage) {
  const container = document.getElementById("email-view");
  if (!emails.length) {
    container.innerHTML = '<div class="empty"><i class="ti ti-inbox"></i><p>All caught up. Inbox is clear.</p></div>';
    updateStats([]);
    return;
  }

  const triageMap = {};
  (triage || []).forEach(t => { triageMap[t.id] = t; });

  updateStats(emails.map(e => (triageMap[e.id] && triageMap[e.id].category) || "fyi"));
  document.getElementById("stats-row").style.display = "grid";

  const analyzing = triage === null;
  const rendered = emails.map(email => {
    const t   = triageMap[email.id] || {};
    const cat = t.category || "fyi";
    const pri = t.priority  || "low";
    const note = analyzing ? "Analyzing..." : (t.aiNote || "");
    const draft = analyzing ? "" : (t.draftReply || "");
    return { cat: cat, html: emailCard(email, cat, pri, note, draft, isNewEmail(email)) };
  });

  if (analyzing) {
    container.innerHTML = rendered.map(r => r.html).join("");
    return;
  }

  const lanes = [
    { key: "action_required", label: "Action required",  color: "var(--red-fg)" },
    { key: "meeting_request", label: "Meeting requests", color: "var(--blue-fg)" },
    { key: "forward",         label: "To forward",       color: "var(--amber-fg)" },
    { key: "fyi",             label: "FYI · monitor",    color: "var(--gray-fg)" },
  ];
  const known = lanes.map(l => l.key);
  let html = "";
  lanes.forEach(lane => {
    const items = rendered.filter(r => (lane.key === "fyi" ? !known.includes(r.cat) || r.cat === "fyi" : r.cat === lane.key));
    if (!items.length) return;
    html += laneHeader(lane.label, items.length, lane.color);
    html += items.map(r => r.html).join("");
  });
  container.innerHTML = html;
}

function laneHeader(label, count, color) {
  return '<div style="display:flex;align-items:center;gap:8px;background:' + color + ';color:#fff;padding:9px 14px;font-size:13px;font-weight:600;border-radius:9px;margin:18px 0 10px;box-shadow:0 2px 8px rgba(16,24,40,0.12)">' +
    '<span>' + esc(label) + '</span>' +
    '<span style="margin-left:auto;background:rgba(255,255,255,0.28);padding:1px 10px;border-radius:999px;font-weight:700;font-size:12px">' + count + '</span></div>';
}

<div class="card" id="card-${email.id}" style="border-left-color:${dotColor}">

        <span>${esc(email.subject || "(no subject)")}</span>

// ================================================================
// RENDER CALENDAR
// ================================================================
function renderCalendar() {
  const container = document.getElementById("calendar-view");
  if (!allEvents.length) {
    container.innerHTML = '<div class="empty"><i class="ti ti-calendar"></i><p>No events in the next 7 days.</p></div>';
    return;
  }
  const wkStart = d => { const x = new Date(d); x.setHours(0,0,0,0); x.setDate(x.getDate() - x.getDay()); return x; };
  const evDate = ev => {
    if (ev.isAllDay) { const dp = ((ev.start && ev.start.dateTime) || "").slice(0,10); return dp ? new Date(dp + "T12:00:00") : new Date(); }
    return toInstant(ev.start && ev.start.dateTime) || new Date();
  };
  const todayWk = wkStart(new Date()).getTime();
  const groups = {};
  allEvents.forEach(ev => {
    const ws = wkStart(evDate(ev));
    const key = ws.getTime();
    if (!groups[key]) groups[key] = { ws: ws, items: [] };
    groups[key].items.push(ev);
  });
  let html = "";
  Object.keys(groups).map(Number).sort((a, b) => a - b).forEach(k => {
    const g = groups[k];
    const diff = Math.round((k - todayWk) / (7 * 86400000));
    const wkEnd = new Date(g.ws); wkEnd.setDate(wkEnd.getDate() + 6);
    const label = diff === 0 ? "This week" : diff === 1 ? "Next week" : "Week of " + g.ws.toLocaleDateString("en-US", { month:"short", day:"numeric" });
    const range = g.ws.toLocaleDateString("en-US", { month:"short", day:"numeric" }) + " to " + wkEnd.toLocaleDateString("en-US", { month:"short", day:"numeric" });
    html += laneHeader(label + "  ·  " + range, g.items.length, "var(--blue-fg)");
    html += g.items.map(eventCard).join("");
  });
  container.innerHTML = html;
}

function eventCard(event) {
  const start    = formatTime(event.start && event.start.dateTime);
  const end      = formatTime(event.end && event.end.dateTime);
  const sInst    = toInstant(event.start && event.start.dateTime);
  const eInst    = toInstant(event.end && event.end.dateTime);
  const allDay   = !!event.isAllDay;
  const datePart = ((event.start && event.start.dateTime) || "").slice(0, 10);
  const dateRef  = allDay ? (datePart ? new Date(datePart + "T12:00:00") : null) : sInst;
  const dateLabel = dateRef ? dateRef.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" }) : "";
  const location = event.location && event.location.displayName;
  const organizer = event.organizer && event.organizer.emailAddress ? event.organizer.emailAddress.name : "";
  const attendees = (event.attendees || []).map(a => (a.emailAddress && (a.emailAddress.name || a.emailAddress.address))).filter(Boolean);

  return `
<div class="card${event.hasConflict ? " conflict" : ""}" id="card-${event.id}"${event.hasConflict ? "" : ' style="border-left-color:var(--blue-fg)"'}>
  ${event.hasConflict ? `<div class="conflict-banner"><i class="ti ti-alert-circle"></i>Conflict: overlaps with "${esc(event.conflictWith)}"</div>` : ""}
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px">
    <div style="flex:1">
      <div class="event-title">${esc(event.subject || "(no title)")}</div>
      <div class="event-meta"><i class="ti ti-calendar" style="font-size:13px"></i>${dateLabel}</div>
      <div class="event-meta"><i class="ti ti-clock" style="font-size:13px"></i>${allDay ? "All day" : (start + " to " + end)}</div>
      ${allDay ? "" : zonesBlock(sInst, eInst)}
      ${location ? `<div class="event-meta"><i class="ti ti-video" style="font-size:13px"></i>${esc(location)}</div>` : ""}
      ${attendees.length ? `<div class="event-meta"><i class="ti ti-users" style="font-size:13px"></i>${esc(attendees.join(", "))}</div>` : ""}
    </div>
  </div>
  <div class="card-actions">
    <button onclick="openPanel('reschedule','${event.id}',true)"><i class="ti ti-calendar-event"></i> Reschedule</button>
    <button class="danger" onclick="openPanel('cancel','${event.id}',true)"><i class="ti ti-x"></i> Cancel</button>
    ${attendees.length ? `<button onclick="openPanel('message','${event.id}',true)"><i class="ti ti-send"></i> Message attendees</button>` : ""}
  </div>
</div>`;
}

function openPanel(type, itemId, isEvent) {
  const item = isEvent ? allEvents.find(e => e.id === itemId) : allEmails.find(e => e.id === itemId);
  if (!item) return;
  activePanel = { type, item, isEvent: !!isEvent };

  const panel = document.getElementById("action-panel");
  panel.style.display = "block";

  const contextLabel = isEvent ? (item.subject || "Event") : (item.subject || "(no subject)");

  const meta = {
    reply:      { title: "Draft reply",       icon: "ti-arrow-back-up" },
    forward:    { title: "Forward to team",   icon: "ti-arrow-forward-up" },
    schedule:   { title: "Schedule meeting",  icon: "ti-calendar-plus" },
    reschedule: { title: "Find a new time",   icon: "ti-calendar-event" },
    cancel:     { title: "Before you cancel", icon: "ti-alert-circle" },
    message:    { title: "Message attendees", icon: "ti-send" },
  }[type] || { title: type, icon: "ti-settings" };

  let body = "";

  if (type === "reply") {
    body = `<div id="draft-area"><div class="loading" style="padding:1rem 0"><i class="ti ti-loader spinning" style="font-size:20px"></i><p>Drafting in your voice...</p></div></div>
    <div class="panel-actions" id="draft-actions" style="display:none">
      <a class="btn" href="${esc(item.webLink || "#")}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> Open in Outlook to send</a>
      <button onclick="regenerateDraft()"><i class="ti ti-refresh"></i> Regenerate</button>
    </div>`;
    setTimeout(() => generateDraft(item), 50);
  } else if (type === "forward") {
    body = `<p style="font-size:13px;color:var(--text-2);margin-bottom:1rem">Who should handle this?</p>
    ${TEAM.map(m => `<button class="team-btn" onclick="alert('Forward action noted. Open the email in Outlook and forward to ${m.name}.')">
      <div class="team-info"><div class="avatar">${m.initials}</div><div><div class="team-name">${m.name}</div><div class="team-role">${m.role}</div></div></div>
      <i class="ti ti-arrow-up-right" style="font-size:14px;color:var(--text-3)"></i>
    </button>`).join("")}`;
  } else if (type === "schedule" || type === "reschedule") {
    const lead = type === "reschedule"
      ? "Pick an open time below and I will move this meeting to it. Its length stays the same."
      : "Pick an open time below and I will set up the meeting.";
    body = `<p class="panel-body">${lead}</p>
    <div id="reschedule-status" style="font-size:13px;color:var(--text-2);margin-bottom:8px;display:none"></div>
    <div id="slots-area"><div class="loading" style="padding:1rem 0"><i class="ti ti-loader spinning" style="font-size:20px"></i><p>Checking your calendar...</p></div></div>`;
    setTimeout(() => findAvailableSlots(), 50);
  } else if (type === "cancel") {
    body = `<p class="panel-body">Before you cancel this, do you want to reschedule instead? I can find open windows this week.</p>
    <div class="panel-actions">
      <button onclick="openPanel('reschedule','${itemId}',true)"><i class="ti ti-calendar-event"></i> Yes, find a new time</button>
      <button class="danger" onclick="confirmCancel('${esc(item.subject || "this event")}','${esc(item.webLink || "#")}')"><i class="ti ti-x"></i> Cancel anyway</button>
    </div>`;
  } else if (type === "message") {
    const attendees = (item.attendees || []).map(a => (a.emailAddress && (a.emailAddress.name || a.emailAddress.address))).filter(Boolean);
    body = `<p style="font-size:13px;color:var(--text-2);margin-bottom:1rem">Draft a message to attendees: ${esc(attendees.join(", "))}.</p>
    <div id="draft-area"><div class="loading" style="padding:1rem 0"><i class="ti ti-loader spinning" style="font-size:20px"></i><p>Drafting message...</p></div></div>
    <div class="panel-actions" id="draft-actions" style="display:none">
      <a class="btn" href="${esc(item.webLink || "#")}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i> Open event in Outlook</a>
      <button onclick="regenerateDraft()"><i class="ti ti-refresh"></i> Regenerate</button>
    </div>`;
    setTimeout(() => generateAttendeeMessage(item), 50);
  }

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-title"><i class="ti ${meta.icon}" style="font-size:16px;color:var(--text-2)"></i>${meta.title}</div>
      <button onclick="closePanel()" aria-label="Close"><i class="ti ti-x" style="font-size:16px"></i></button>
    </div>
    <div class="panel-context">${esc(contextLabel)}</div>
    ${body}`;

  panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function closePanel() {
  const panel = document.getElementById("action-panel");
  panel.style.display = "none";
  panel.innerHTML = "";
  activePanel = null;
}

// ================================================================
// CLAUDE — DRAFT REPLY / MESSAGE
// ================================================================
async function generateDraft(email) {
  try {
    const fromName = email.from && email.from.emailAddress ? email.from.emailAddress.name : "";
    const data = await callClaude({
      model: "claude-sonnet-4-6",
      max_tokens: 500,
      system: `You are drafting a reply email in Geronimo LeBaron's voice. He is warm, visionary, strategic, relational. He uses phrases like "Right?", "So...", "I think...", "I believe...", "Does that make sense?" His tone is that of a teacher and mentor. He never uses any dash characters in his writing. Keep the reply to 3 to 5 sentences. Return ONLY the email body text. No subject line. No greeting opener. No sign-off line.`,
      messages: [{ role: "user", content: `Draft a reply. Sender: ${fromName}. Subject: "${email.subject}". Content: "${(email.bodyPreview||"").substring(0,300)}"` }]
    });
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    showDraft(text);
  } catch (e) {
    showDraft("Could not generate draft. Check that your proxy URL is set in config.js and the worker is deployed.");
  }
}

async function generateAttendeeMessage(event) {
  const attendees = (event.attendees || []).map(a => (a.emailAddress && a.emailAddress.name) || "").filter(Boolean).join(", ");
  const sInst = toInstant(event.start && event.start.dateTime);
  const eInst = toInstant(event.end && event.end.dateTime);
  const zoneStr = sInst
    ? TZONES.map(z => z.label + " " + tzTime(sInst, z.tz) + (eInst ? " to " + tzTime(eInst, z.tz) : "")).join(", ")
    : "";
  const dateStr = sInst ? sInst.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }) : "";
  try {
    const data = await callClaude({
      model: "claude-sonnet-4-6",
      max_tokens: 400,
      system: `You are drafting a message from Geronimo LeBaron to meeting attendees. His voice is warm, direct, and relational. No dash characters. 2 to 3 sentences. Whenever you mention the meeting time, spell it out across every listed time zone so no one across the US and Mexico border is confused.`,
      messages: [{ role: "user", content: `Draft a brief message to the attendees (${attendees}) of the meeting "${event.subject}" on ${dateStr}. When referencing the time, write it across these zones exactly: ${zoneStr}. Keep it open-ended since the specific update will be filled in.` }]
    });
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    showDraft(text);
  } catch (e) {
    showDraft("Could not generate draft. Check that your proxy URL is set in config.js and the worker is deployed.");
  }
}

function regenerateDraft() {
  if (!activePanel) return;
  const area = document.getElementById("draft-area");
  const actions = document.getElementById("draft-actions");

}

// ================================================================
// FIND AVAILABLE SLOTS
// ================================================================
async function findAvailableSlots() {
  try {
    const now     = new Date();
    const weekEnd = new Date(now); weekEnd.setDate(now.getDate() + 5);
    const token   = await getToken();
    if (!token) throw new Error("No token");

    const data = await fetch(
      "https://graph.microsoft.com/v1.0/me/calendarview" +
      "?startdatetime=" + now.toISOString() +
      "&enddatetime=" + weekEnd.toISOString() +
      "&$select=subject,start,end&$top=50&$orderby=start/dateTime",
      { headers: { Authorization: "Bearer " + token, Prefer: 'outlook.timezone="UTC"' } }
    ).then(r => r.json());

    const busySlots = (data.value || []).map(e => ({
      start: toInstant(e.start.dateTime),
      end:   toInstant(e.end.dateTime),
    }));

    const slots = [];
    let check = new Date(now);
    check.setMinutes(0,0,0);
    if (check.getHours() < 8) check.setHours(8);

    while (slots.length < 3 && check < weekEnd) {
      const h = check.getHours();
      const day = check.getDay();
      if (day !== 0 && day !== 6 && h >= 8 && h < 17 && h !== 12) {
        const slotEnd = new Date(check); slotEnd.setHours(h+1);
        const conflict = busySlots.find(b => check < b.end && slotEnd > b.start);
        if (!conflict) {
          const score = slots.length === 0 ? "best" : slots.length === 1 ? "good" : "ok";
          const reason = h < 10 ? "Early morning, good focus block" : h < 13 ? "Mid-morning, calendar clear" : "Afternoon open block";
          slots.push({ slot: formatSlot(check, slotEnd), score, reason, start: new Date(check), end: new Date(slotEnd) });
        }
      }
      check.setHours(check.getHours()+1);
    }

    const slotsHtml = slots.length
      ? slots.map(s => slotCard(s)).join("")
      : "<p style='font-size:13px;color:var(--text-2)'>No clear windows found this week. Consider next week.</p>";

    const area = document.getElementById("slots-area");
    if (area) area.innerHTML = slotsHtml;
  } catch {
    const area = document.getElementById("slots-area");
    if (area) area.innerHTML = "<p style='font-size:13px;color:var(--text-2)'>Could not load calendar availability.</p>";
  }
}

function slotCard(slot) {
  const color = { best: "var(--green-bg)", good: "var(--blue-bg)", ok: "var(--amber-bg)" }[slot.score] || "var(--blue-bg)";
  const fg    = { best: "var(--green-fg)", good: "var(--blue-fg)", ok: "var(--amber-fg)" }[slot.score] || "var(--blue-fg)";
  return `<div class="slot-card">
    <div class="slot-info">
      <div class="slot-time">${esc(slot.slot)}</div>
      <div class="slot-reason">${esc(slot.reason)}</div>
      ${zonesBlock(slot.start, slot.end)}
    </div>
    <div class="slot-actions">
      <span class="badge" style="background:${color};color:${fg}">${slot.score}</span>
      <button class="primary" onclick="pickSlot('${slot.start.toISOString()}','${slot.end.toISOString()}')">Pick this</button>
    </div>
  </div>`;
}

// ================================================================
// AVAILABILITY (quick daily open windows)
// ================================================================
async function renderAvailability() {
  const view = document.getElementById("availability-view");
  view.innerHTML = '<div class="loading"><i class="ti ti-loader spinning"></i><p>Finding open windows...</p></div>';
  try {
    const token = await getToken();
    if (!token) throw new Error("No token");
    const start = new Date(); start.setHours(0,0,0,0);
    const end   = new Date(start); end.setDate(start.getDate() + 9);
    const data = await fetch(
      "https://graph.microsoft.com/v1.0/me/calendarview?startdatetime=" + start.toISOString() +
      "&enddatetime=" + end.toISOString() + "&$select=subject,start,end&$top=150&$orderby=start/dateTime",
      { headers: { Authorization: "Bearer " + token, Prefer: 'outlook.timezone="UTC"' } }
    ).then(r => r.json());
    const events = (data.value || []).map(e => ({ start: toInstant(e.start.dateTime), end: toInstant(e.end.dateTime) }))
      .filter(e => e.start && e.end);

    const days = [];
    const cursor = new Date(); cursor.setHours(0,0,0,0);
    while (days.length < 5) {
      const d = cursor.getDay();
      if (d !== 0 && d !== 6) days.push(new Date(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    view.innerHTML = days.map(d => dayAvailabilityCard(d, events)).join("");
  } catch (e) {
    view.innerHTML = '<div class="empty"><i class="ti ti-alert-circle"></i><p>Could not load availability.</p></div>';
  }
}

function dayAvailabilityCard(dayDate, events) {
  const now      = new Date();
  const dayStart = new Date(dayDate); dayStart.setHours(8,0,0,0);
  const dayEnd   = new Date(dayDate); dayEnd.setHours(18,0,0,0);
  const isToday  = dayDate.toDateString() === now.toDateString();

  let from = new Date(dayStart);
  if (isToday && now > from) {
    from = new Date(now);
    from.setMinutes(from.getMinutes() <= 30 ? 30 : 60, 0, 0);
    if (from < dayStart) from = new Date(dayStart);
  }

  // Busy intervals clipped to the business window, then merged.
  const busy = events
    .filter(ev => ev.start < dayEnd && ev.end > dayStart)
    .map(ev => ({ s: ev.start < dayStart ? new Date(dayStart) : new Date(ev.start), e: ev.end > dayEnd ? new Date(dayEnd) : new Date(ev.end) }))
    .sort((a, b) => a.s - b.s);
  const merged = [];
  busy.forEach(b => {
    const last = merged[merged.length - 1];
    if (last && b.s <= last.e) { if (b.e > last.e) last.e = b.e; }
    else merged.push({ s: new Date(b.s), e: new Date(b.e) });
  });

  // Free gaps of at least 30 minutes.
  const free = [];
  let p = new Date(from);
  merged.forEach(b => {
    if (b.s > p) free.push({ s: new Date(p), e: new Date(b.s) });
    if (b.e > p) p = new Date(b.e);
  });
  if (p < dayEnd) free.push({ s: new Date(p), e: new Date(dayEnd) });
  const windows = free.filter(w => (w.e - w.s) >= 30 * 60 * 1000);

  const label = dayDate.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
  const body = windows.length
    ? windows.map(w => {
        const sISO = w.s.toISOString(), eISO = w.e.toISOString();
        return `<div class="slot-card" style="border-left:4px solid var(--green-fg)">
           <span style="width:8px;height:8px;border-radius:50%;background:var(--green-fg);flex-shrink:0"></span>
           <div class="slot-info">
             <div class="slot-time">${formatTime(sISO)} to ${formatTime(eISO)}</div>
             <div class="slot-reason" style="font-size:11px;color:var(--text-3)">${TZONES.map(z => z.label + " " + tzTime(w.s, z.tz)).join("  ·  ")}</div>
           </div>
           <div class="slot-actions">
             <button onclick="openAddEventPanel('${sISO}','${eISO}')" style="background:var(--green-bg);color:var(--green-fg)"><i class="ti ti-plus"></i> Add</button>
           </div>
         </div>`;
      }).join("")
    : `<div class="slot-reason" style="padding:8px 12px;color:var(--text-2)">No open windows in business hours.</div>`;

  const header = '<div style="display:flex;align-items:center;gap:8px;background:var(--green-fg);color:#fff;padding:9px 14px;font-size:13px;font-weight:600;border-radius:9px;margin:18px 0 10px;box-shadow:0 2px 8px rgba(16,24,40,0.12)">' +
    '<span>' + esc(label) + (isToday ? ' &middot; Today' : '') + '</span>' +
    (windows.length ? ' <span style="margin-left:auto;background:rgba(255,255,255,0.28);padding:1px 10px;border-radius:999px;font-weight:700;font-size:12px">' + windows.length + ' open</span>' : '') +
    '</div>';
  return header + body;
}

// ================================================================
// CREATE EVENT (in-app booking; calendar write via incremental consent)
// ================================================================
async function getWriteTokenSilent() {
  const account = msalApp.getActiveAccount() || msalApp.getAllAccounts()[0];
  if (!account) return null;
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: ["Calendars.ReadWrite"], account });
    return r.accessToken;
  } catch (e) {
    return null;
  }
}

async function graphPost(path, body, token) {
  const res = await fetch("https://graph.microsoft.com/v1.0" + path, {
    method: "POST",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) { const t = await res.text(); throw new Error("Graph " + res.status + ": " + t.slice(0, 140)); }
  return res.json();
}

async function graphPatch(path, body, token) {
  const res = await fetch("https://graph.microsoft.com/v1.0" + path, {
    method: "PATCH",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) { const t = await res.text(); throw new Error("Graph " + res.status + ": " + t.slice(0, 140)); }
  return res.json();
}

// Pick this: in reschedule mode move the existing meeting; from an email
// meeting request, open the booking panel prefilled to create a new one.
async function pickSlot(sISO, eISO) {
  if (activePanel && activePanel.type === "reschedule" && activePanel.item) {
    return rescheduleEventTo(activePanel.item, sISO);
  }
  openAddEventPanel(sISO, eISO);
}

function rescheduleStatus(msg, isError) {
  const el = document.getElementById("reschedule-status");
  if (!el) return;
  el.style.display = "block";
  el.style.color = isError ? "var(--red-fg)" : "var(--text-2)";
  el.textContent = msg;
}

async function rescheduleEventTo(event, sISO) {
  // Keep the meeting's original length; just move the start.
  const oStart = toInstant(event.start && event.start.dateTime);
  const oEnd   = toInstant(event.end && event.end.dateTime);
  const durMs  = (oStart && oEnd) ? (oEnd - oStart) : 60 * 60000;
  const newStart = new Date(sISO);
  const newEnd   = new Date(newStart.getTime() + durMs);
  const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || "UTC";
  const body = {
    start: { dateTime: localWallClock(newStart), timeZone: tz },
    end:   { dateTime: localWallClock(newEnd),   timeZone: tz },
  };
  rescheduleStatus("Moving the meeting...");
  const token = await getWriteTokenSilent();
  if (token) {
    try {
      await graphPatch("/me/events/" + event.id, body, token);
      rescheduleStatus("Done. Refreshing your calendar...");
      setTimeout(() => { closePanel(); loadCalendar(); renderAvailability(); }, 800);
    } catch (e) {
      rescheduleStatus("Could not move it: " + ((e && e.message) || "").slice(0, 90), true);
    }
    return;
  }
  // First time only: need one-time calendar-write consent. Stash and redirect.
  try { sessionStorage.setItem("cc_pending_reschedule", JSON.stringify({ id: event.id, sISO: newStart.toISOString(), eISO: newEnd.toISOString() })); } catch (e) {}
  rescheduleStatus("One time step: approving calendar access with Microsoft. The page will reload and finish the move.");
  try {
    await msalApp.acquireTokenRedirect({ scopes: ["Calendars.ReadWrite"] });
  } catch (e) {
    rescheduleStatus("Calendar access could not start. Your admin may need to approve calendar write for this app.", true);
  }
}

// Produce a "YYYY-MM-DDTHH:mm:ss" string in the browser's local wall clock.
function localWallClock(d) {
  const p = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) +
    "T" + p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
}

function buildEventBody(title, sISO, eISO, attStr) {
  // Create the event in the user's own time zone so Outlook shows it correctly
  // (not as UTC). dateTime is the local wall clock; timeZone is the IANA zone.
  const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || "UTC";
  const s = new Date(sISO), e = new Date(eISO);
  const body = {
    subject: title,
    start: { dateTime: localWallClock(s), timeZone: tz },
    end:   { dateTime: localWallClock(e), timeZone: tz },
  };
  if (attStr) {
    body.attendees = attStr.split(",").map(x => x.trim()).filter(Boolean)
      .map(a => ({ emailAddress: { address: a }, type: "required" }));
  }
  return body;
}

// After the one-time calendar-access redirect, finish what the user started:
// a new event they were creating, or a reschedule they were applying.
async function resumePendingEvent() {
  let pe = null, pr = null;
  try { pe = JSON.parse(sessionStorage.getItem("cc_pending_event")); } catch (e) {}
  try { pr = JSON.parse(sessionStorage.getItem("cc_pending_reschedule")); } catch (e) {}
  if (!pe && !pr) return;
  const token = await getWriteTokenSilent();
  if (!token) return; // consent still not granted (admin may be required)

  if (pe) {
    try { sessionStorage.removeItem("cc_pending_event"); } catch (e) {}
    try {
      await graphPost("/me/events", buildEventBody(pe.title, pe.sISO, pe.eISO, pe.attStr), token);
      alert('Added to your calendar: "' + pe.title + '"');
    } catch (e) {}
  }

  if (pr) {
    try { sessionStorage.removeItem("cc_pending_reschedule"); } catch (e) {}
    const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || "UTC";
    try {
      await graphPatch("/me/events/" + pr.id, {
        start: { dateTime: localWallClock(new Date(pr.sISO)), timeZone: tz },
        end:   { dateTime: localWallClock(new Date(pr.eISO)), timeZone: tz },
      }, token);
      alert("Your meeting was moved.");
    } catch (e) {}
  }

  loadCalendar();
}

// The open window the user tapped Add on (used to anchor the date).
let addWindowISO = null;

// Compute the chosen start/end from the Start time field and Length selector.
function chosenStartEnd() {
  const base = new Date(addWindowISO);
  const timeVal = (document.getElementById("ev-start") || {}).value || "";
  const dur = parseInt((document.getElementById("ev-duration") || {}).value || "30", 10);
  let hh = base.getHours(), mm = base.getMinutes();
  const m = /^(\d{1,2}):(\d{2})$/.exec(timeVal);
  if (m) { hh = +m[1]; mm = +m[2]; }
  const start = new Date(base); start.setHours(hh, mm, 0, 0);
  const end = new Date(start.getTime() + dur * 60000);
  return { start: start, end: end };
}

// Live preview of exactly what will be booked, across zones.
function updateSlotPreview() {

    '<div style="font-size:11px;color:var(--text-3);margin-top:3px">' + zones + '</div>';
}

async function bookSlot() {
  const titleEl = document.getElementById("ev-title");
  const attEl   = document.getElementById("ev-attendees");
  const status  = document.getElementById("ev-status");
  const title   = ((titleEl && titleEl.value) || "").trim();
  const attStr  = ((attEl && attEl.value) || "").trim();
  if (attStr) { attStr.split(",").map(x => x.trim()).filter(Boolean).forEach(em => addContact(em)); saveContacts(); }
  if (!title) { if (status) { status.style.color = "var(--red-fg)"; status.textContent = "Please type an event title first."; } return; }
  const se = chosenStartEnd();
  const sISO = se.start.toISOString(), eISO = se.end.toISOString();
  if (status) { status.style.color = "var(--text-2)"; status.textContent = "Creating the event..."; }

  const token = await getWriteTokenSilent();
  if (token) {
    try {
      await graphPost("/me/events", buildEventBody(title, sISO, eISO, attStr), token);
      if (status) status.textContent = "Event created. Refreshing your calendar...";
      setTimeout(() => { closePanel(); loadCalendar(); renderAvailability(); }, 900);
    } catch (e) {
      if (status) { status.style.color = "var(--red-fg)"; status.textContent = "Could not create it: " + ((e && e.message) || "").slice(0, 90); }
    }
    return;
  }

  // First time only: need one-time calendar-write consent. Stash the event and redirect.
  try { sessionStorage.setItem("cc_pending_event", JSON.stringify({ sISO, eISO, title, attStr })); } catch (e) {}
  if (status) status.textContent = "One time step: approving calendar access with Microsoft. The page will reload and then add your event automatically.";
  try {
    await msalApp.acquireTokenRedirect({ scopes: ["Calendars.ReadWrite"] });
  } catch (e) {
    if (status) { status.style.color = "var(--red-fg)"; status.textContent = "Calendar access could not start. Your admin may need to approve calendar write for this app."; }
  }
}

function markDone(emailId) {

        document.getElementById("email-view").innerHTML = '<div class="empty"><i class="ti ti-inbox"></i><p>All caught up. Inbox is clear.</p></div>';
      }
    }, 200);
  }
  if (activePanel && activePanel.item && activePanel.item.id === emailId) closePanel();
}

function updateStats(categories) {
  const total  = categories.length;
  const action = categories.filter(c => c === "action_required").length;
  const fwd    = categories.filter(c => c === "forward").length;
  document.getElementById("stats-row").innerHTML = [
    { label: "In inbox",        value: total,  bg: "var(--bg-3)",     fg: "var(--text)" },
    { label: "Action required", value: action, bg: "var(--red-bg)",   fg: "var(--red-fg)" },
    { label: "To forward",      value: fwd,    bg: "var(--amber-bg)", fg: "var(--amber-fg)" },
  ].map(s => `<div class="stat" style="background:${s.bg}">
    <div class="stat-label" style="color:${s.fg}">${s.label}</div>
    <div class="stat-value" style="color:${s.fg}">${s.value}</div>
  </div>`).join("");
}

function catTag(cat) {
  const map = {
    action_required: ["Action required", "var(--red-bg)",   "var(--red-fg)"],
    forward:         ["Forward",         "var(--amber-bg)", "var(--amber-fg)"],
    meeting_request: ["Meeting request", "var(--blue-bg)",  "var(--blue-fg)"],
    fyi:             ["FYI",             "var(--gray-bg)",  "var(--gray-fg)"],
  };
  const [label, bg, fg] = map[cat] || map.fyi;
  return `<span class="badge" style="background:${bg};color:${fg}">${label}</span>`;
}

function detectConflicts(events) {
  return events.map((event, i) => {
    const s = toInstant(event.start && event.start.dateTime);
    const e = toInstant(event.end && event.end.dateTime);
    const conflict = events.find((other, j) => {
      if (i === j) return false;
      const os = toInstant(other.start && other.start.dateTime);
      const oe = toInstant(other.end && other.end.dateTime);
      return s < oe && e > os;
    });
    return Object.assign({}, event, { hasConflict: !!conflict, conflictWith: (conflict && conflict.subject) || null });
  });
}

// Zones to label every time in (US/Mexico border coverage).
const TZONES = [
  { tz: "America/Los_Angeles", label: "PT" },
  { tz: "America/Denver",      label: "MT" },
  { tz: "America/Phoenix",     label: "AZ/Son" },
  { tz: "America/Chicago",     label: "CT" },
];

// Graph returns UTC without a trailing Z; treat zone-less strings as UTC
// so the absolute instant is always correct before we re-display it.
function toInstant(dt) {
  if (!dt) return null;
  return new Date(/[zZ]|[+-]\d\d:?\d\d$/.test(dt) ? dt : dt + "Z");
}

function tzTime(instant, tz) {
  if (!instant) return "";
  return new Intl.DateTimeFormat("en-US", { timeZone: tz, hour:"numeric", minute:"2-digit", hour12:true }).format(instant);
}

// Compact multi-zone block for an event or a slot.
function zonesBlock(startInstant, endInstant) {
  if (!startInstant) return "";
  return `<div style="margin-top:6px;display:grid;grid-template-columns:auto 1fr;gap:2px 8px">` +
    TZONES.map(z =>
      `<span style="font-size:11px;color:var(--text-3);font-weight:500">${z.label}</span>` +
      `<span style="font-size:11px;color:var(--text-2)">${tzTime(startInstant, z.tz)}${endInstant ? " to " + tzTime(endInstant, z.tz) : ""}</span>`
    ).join("") +
    `</div>`;
}

function formatTime(dt) {
  const inst = toInstant(dt);
  if (!inst) return "";
  return inst.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", hour12:true });
}

function formatEmailTime(dt) {
  if (!dt) return "";
  const d = new Date(dt);
  if (d.toDateString() === new Date().toDateString())
    return d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", hour12:true });
  return d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}

function formatSlot(start, end) {
  const opts = { weekday:"short", month:"short", day:"numeric" };
  return start.toLocaleDateString("en-US", opts) + ", " + formatTime(start.toISOString()) + " to " + formatTime(end.toISOString());
}

function showLoading(containerId, label) {
  document.getElementById(containerId).innerHTML =
    `<div class="loading"><i class="ti ti-loader spinning"></i><p>${label}</p></div>`;
}

function showLoginError(msg) {
  const el = document.getElementById("login-err");
  el.textContent = msg;
  el.style.display = "block";
}
function hideLoginError() {
  document.getElementById("login-err").style.display = "none";
}

function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
